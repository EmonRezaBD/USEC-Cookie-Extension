<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cookie Transparency</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <header>
        <span class="icon">🍪</span>
        <h1>Cookie Transparency</h1>
        <span id="total-badge">—</span>
    </header>

    <section class="chart-grid">
        <div class="chart-card">
            <h2>By purpose</h2>
            <canvas id="chart-purpose" width="120" height="120"></canvas>
            <div id="legend-purpose" class="legend"></div>
        </div>
        <div class="chart-card">
            <h2>By duration</h2>
            <canvas id="chart-type" width="120" height="120"></canvas>
            <div id="legend-type" class="legend"></div>
        </div>
        <div class="chart-card wide">
            <h2>By origin</h2>
            <div id="bars-origin"></div>
        </div>
    </section>

    <section class="cookie-list">
        <h2>All cookies <span id="filter-tag"></span></h2>
        <div id="cookie-rows"></div>
    </section>

    <script src="cookies.js"></script>
    <script src="charts.js"></script>
    <script src="popup.js"></script>
</body>

</html>
